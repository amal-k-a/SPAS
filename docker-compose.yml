version: '3.8'

services:
  # MongoDB Database
  mongo:
    image: mongo:7.0
    container_name: student-analytics-mongo
    restart: unless-stopped
    environment:
      MONGO_INITDB_DATABASE: student_analytics
    volumes:
      - mongo_data:/data/db
    ports:
      - "27017:27017"
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Flask Backend
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: student-analytics-backend
    restart: unless-stopped
    environment:
      MONGO_URI: mongodb://mongo:27017/student_analytics
      SECRET_KEY: your-secret-key-change-in-production-2024
      FLASK_ENV: production
    depends_on:
      mongo:
        condition: service_healthy
    ports:
      - "5000:5000"
    networks:
      - app-network
    volumes:
      - /tmp/uploads:/tmp/uploads

  # Angular Frontend (Nginx)
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: student-analytics-frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "80:80"
    networks:
      - app-network

volumes:
  mongo_data:
    driver: local

networks:
  app-network:
    driver: bridge
